# chat — dev compose
#
# Single CommunitySolidServer v7 instance on port 3031 hosting both demo
# personas (alice and bob). This matches the v0 scope in docs/PRD.md:
# "same-CSS-instance, same OIDC issuer". Cross-server federation (alice
# on one CSS, bob on another) is deferred to v1 — it requires UMA tokens
# and is broken in plain docker because each container's localhost is
# itself, so an alice-CSS container can't reach a bob-CSS container at
# `http://localhost:3032/` to validate bob's WebID.
#
# Ports use the 303x decade to coexist with sibling prototypes:
#   - mind-market-v0       300x
#   - codespaces           301x
#   - mind-os-v0           302x
#   - chat                 303x  ← this stack (3030 app + 3031 CSS)
#   - mind-social-network  305x

services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-chat-css
    ports:
      - "3031:3031"
    volumes:
      - css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3031
      - --baseUrl=http://localhost:3031/
      - --rootFilePath=/data
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped

volumes:
  css-data:
